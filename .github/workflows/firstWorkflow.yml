name: my-first-workflow
on:
  push:

jobs:
  job1:
    name: JOB1
    runs-on: ubuntu-latest
    steps:
      - name: Step 1
        run: |
          pwd
          ls -ltr
          hostname

      - name: Step-2 Checkout
        uses: actions/checkout@v4

      - name: Step-3
        run: |
          echo $(pwd) >> myartifact.txt
          mkdir artifacts
          echo $(ls -ltr) >> artifacts/list.txt
          echo $(hostname) >> artifacts/hostname.txt

      - name: Upload a single file
        uses: actions/upload-artifact@v4
        with:
          name: single_file
          path: ./myartifact.txt

      - name: Upload multiple files
        uses: actions/upload-artifact@v4
        with:
          name: directory_artifacts
          path: artifacts/

      - name: Upload multiple paths
        uses: actions/upload-artifact@v4
        with:
          name: multiple_paths
          path: |
            ./myartifact.txt
            artifacts/

      - name: Upload multiple paths with exclusion
        uses: actions/upload-artifact@v4
        with:
          name: multiple_paths_excluded
          path: |
            ./myartifact.txt
            artifacts/
            !**/hostname.txt

  job2:
    name: JOB2
    needs: job1
    runs-on: ubuntu-latest
    steps:
      - name: Step 1
        run: |
          pwd
          ls -ltr

      - name: Download single file artifact
        uses: actions/download-artifact@v8
        with:
          name: single_file

      - name: Checking current directory post download
        run: |
          pwd
          ls -ltr

  job3:
    name: JOB3
    needs: job1
    runs-on: ubuntu-latest
    steps:
      - name: Step 1
        run: |
          pwd
          ls -ltr

      - name: Download directory  
        uses: actions/download-artifact@v8
        with:
          name: directory artifacts

      - name: Checking current directory post download
        run: |
          pwd
          ls -ltr        
  job4:
    name: JOB4
    needs: job1
    runs-on: ubuntu-latest
    steps:
      - name: Creating custom folder for artifacts
        run: |
          mkdir -p single_file
          mkdir -p directory
    
      - name: Step 1
        run: |
          pwd
          ls -ltr
      - name: Download single file artifact
        uses: actions/download-artifact@v8
        with:
          name: single_file
          path: single_file
      - name: Download directory  
        uses: actions/download-artifact@v8
        with:
          name: directory artifacts
          path: directory

      - name: Checking current directory post download
        run: |
          pwd
          echo "Contents of single_file folder"
          ls -ltr single_file
          echo "Contents of directory folder"
          ls -ltr directory
