name: my-first-workflow
on:
  push:
jobs:
  job1:
    name: JOB1
    runs-on: ubuntu-latest
    steps:
      - name: Step 1
        run: |
          pwd
          ls -ltr
          hostname

      - name: Step-2 Checkout
        uses: actions/checkout@v4

      - name: Step-3
        run: |
          pwd >> myartifact.txt
          ls -ltr
          hostname

      - name: Upload a single file
        uses: actions/upload-artifact@v4
        with:
          name: single_file
          path: ./myartifact.txt
