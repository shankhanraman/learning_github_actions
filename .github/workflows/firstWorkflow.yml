name: my-first-workflow
on:
  push:
jobs:
  job1:
    name: JOB1
    runs-on: ubuntu-latest
    steps:
      - name: Step 1
        run: |
          pwd
          ls -ltr
          hostname

      - name: Step-2 Checkout
        uses: actions/checkout@v4

      - name: Step-3
        run: |
          echo $(pwd) >> myartifact.txt
          mkdir artifacts
          echo $(ls -ltr) >> artifacts/list.txt
          echo $(hostname) >> artifacts/hostname.txt

      - name: Upload a single file
        uses: actions/upload-artifact@v4
        with:
          name: single_file
          path: ./myartifact.txt

      - name: Upload multiple files
        uses: actions/upload-artifact@v4
        with:
          name: directory_artifacts
          path: artifacts/

      - name: Upload multiple paths
        uses: actions/upload-artifact@v4
        with:
          name: multiple_paths
          path: |
            ./myartifact.txt
            artifacts/

      - name: Upload multiple paths with exclusion
        uses: actions/upload-artifact@v4
        with:
          name: multiple_paths_excluded
          path: |
            ./myartifact.txt
            artifacts/
            !**/hostname.txt
