name: my-first-workflow
on:
  push:
    branches:
      - dev 
      - main
  pull_request:
    branches:
      - main

jobs:
  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Step-1 Checkout
        uses: actions/checkout@v4
      - name: Step-2 Run Unit Tests
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.10'
      - name: Step-3 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit test
        run: |
          mkdir ./reports
          pytest --junitxml=./reports/junit.xml --cov=./ --cov-report=xml:./reports/coverage.xml
      - name: Upload Code coverage report
        uses: actions/upload-artifact@v5.0.0
        with:
          name: Unit-Test-Report
          path: reports/
  codeql:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write # Required to upload the analysis results
    strategy:
      matrix:
        language: [ 'python' ]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5.0.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Perform Code Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "security"
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: sonar Quality Gate Check
        uses: SonarSource/sonarqube-quality-gate-action@v1.1.0 # v1.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
              
